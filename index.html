<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DBCGame — Kalisz Run & Gun</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; }
      body {
        margin: 0;
        font-family: monospace;
        background: #0d1626;
        color: #e6edf8;
        overflow: hidden;
      }

      .game-shell {
        position: fixed;
        inset: 0;
        padding:
          max(6px, env(safe-area-inset-top))
          max(6px, env(safe-area-inset-right))
          max(6px, env(safe-area-inset-bottom))
          max(6px, env(safe-area-inset-left));
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 8px;
      }

      .canvas-wrap {
        min-height: 0;
        border: 3px solid #d1a64d;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 16px 48px rgba(0, 0, 0, .45);
        background: #3d74cc;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .hud-line {
        margin: 0;
        padding: 0 4px;
        text-align: center;
        font-size: 12px;
        opacity: .92;
      }

      .touch-controls {
        display: none;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
        gap: 8px;
      }
      .touch-controls.show { display: grid; }

      .btn {
        border: 2px solid #d1a64d;
        border-radius: 12px;
        background: #162846;
        color: #f5e8c2;
        font-weight: 700;
        font-size: clamp(16px, 3.5vw, 22px);
        min-height: 52px;
        padding: 10px 6px;
        touch-action: none;
      }
      .btn.active {
        background: #2d4772;
        transform: translateY(1px);
      }

      @media (max-width: 820px), (hover: none), (pointer: coarse) {
        .game-shell {
          gap: 6px;
          grid-template-rows: 1fr auto auto;
        }
        .hud-line { font-size: 11px; }
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <section class="canvas-wrap">
        <canvas id="game" width="960" height="540" aria-label="Kalisz Run and Gun"></canvas>
      </section>

      <p class="hud-line">Move: A/D or ←/→ • Jump: W/↑/Space • Shoot: J/K • Restart: R</p>

      <div id="touch-controls" class="touch-controls" aria-label="iPhone controls">
        <button class="btn" data-btn="left">◀</button>
        <button class="btn" data-btn="right">▶</button>
        <button class="btn" data-btn="jump">⤒</button>
        <button class="btn" data-btn="shoot">●</button>
        <button class="btn" data-btn="restart">↻</button>
      </div>
    </main>
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
