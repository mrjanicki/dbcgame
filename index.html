<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DBCGame — Kalisz Run & Gun</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: monospace;
        background: #0d1626;
        color: #e6edf8;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 8px;
      }
      .wrap {
        width: min(100vw - 16px, 960px);
        text-align: center;
      }
      canvas {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        border: 4px solid #d1a64d;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #3d74cc;
        box-shadow: 0 16px 48px rgba(0, 0, 0, .45);
        border-radius: 8px;
      }
      p { margin: 8px 0 0; font-size: 12px; opacity: .9; }

      .touch-controls {
        display: none;
        margin-top: 10px;
        grid-template-columns: repeat(5, minmax(52px, 1fr));
        gap: 8px;
        user-select: none;
      }
      .touch-controls.show { display: grid; }
      .btn {
        border: 2px solid #d1a64d;
        border-radius: 12px;
        background: #162846;
        color: #f5e8c2;
        font-weight: 700;
        font-size: 16px;
        padding: 10px 6px;
      }
      .btn.active {
        background: #2d4772;
        transform: translateY(1px);
      }
      .btn.wide { grid-column: span 2; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <canvas id="game" width="960" height="540" aria-label="Kalisz Run and Gun"></canvas>
      <p>Move: A/D or ←/→ • Jump: W/↑/Space • Shoot: J/K • Restart: R</p>
      <div id="touch-controls" class="touch-controls" aria-label="iPhone controls">
        <button class="btn" data-btn="left">◀</button>
        <button class="btn" data-btn="right">▶</button>
        <button class="btn" data-btn="jump">⤒</button>
        <button class="btn" data-btn="shoot">●</button>
        <button class="btn" data-btn="restart">↻</button>
      </div>
    </div>
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
